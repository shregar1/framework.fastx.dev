# FastMVC Pre-commit Hooks
# Ensures code quality on every commit
# Install: pre-commit install
# Update: pre-commit autoupdate

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Prevent committing to main/master directly
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

      # Trailing whitespace
      - id: trailing-whitespace
        exclude:
          ^(migrations/|.*\.md|.*\.json)$

      # End of file fixer
      - id: end-of-file-fixer
        exclude: ^(migrations/|.*\.snap)$

      # Check YAML syntax
      - id: check-yaml

      # Check JSON syntax
      - id: check-json

      # Check TOML syntax
      - id: check-toml

      # Check for merge conflicts
      - id: check-merge-conflict

      # Check for debug statements
      - id: debug-statements

      # Check for private keys
      - id: detect-private-key

      # Check file encoding
      - id: fix-byte-order-marker

      # Mixed line endings
      - id: mixed-line-ending
        args: [--fix=lf]

      # Check executable permissions
      - id: check-executables-have-shebangs

      # Check shebang scripts are executable
      - id: check-shebang-scripts-are-executable

  # Ruff - Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
        exclude: ^(migrations/|alembic/)

      # Run the formatter
      - id: ruff-format
        types_or: [python, pyi]
        exclude: ^(migrations/|alembic/)

  # Python type checking (optional but recommended)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-python-dateutil
          - types-requests
          - types-redis
          - pydantic
          - sqlalchemy
        args: [--ignore-missing-imports, --show-error-codes]
        exclude: ^(migrations/|tests/|alembic/)
        stages: [commit]

  # Pytest - Run quick tests
  - repo: local
    hooks:
      - id: pytest-quick
        name: pytest-quick
        entry: bash -c 'if [ -f .venv/bin/pytest ]; then .venv/bin/pytest -x -q --tb=short tests/unit/ 2>/dev/null || true; else echo "Skipping tests (no venv)"; fi'
        language: system
        types: [python]
        pass_filenames: false
        always_run: false
        stages: [commit]

      - id: git-log-recorder
        name: git-log-recorder
        entry: python3 scripts/git_log_recorder.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [post-commit]

  # Additional security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "."]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^(tests/|migrations/|alembic/)
        stages: [commit]

  # Check for secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--Iline', '.secrets.Iline']
        exclude:
          ^(Pipfile\.lock|.*\.lock|.*\.json|.*\.ipynb|.*\.xml|.*\.csv)$

  # Git commit message format
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Documentation formatting
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      # Prevent blanket noqa
      - id: python-check-blanket-noqa
      # Check for eval()
      - id: python-no-eval
      # Check for log format
      - id: python-use-type-annotations

# Skip certain hooks in CI
# Set SKIP=hook-id in environment variables
ci:
  skip:
    - pytest-quick
    - mypy
    - commitizen
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  submodules: false
