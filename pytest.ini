[pytest]
# Tests live at repo root: tests/
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode
asyncio_mode = auto

# Default run: no coverage gate (use `pytest --cov=...` in CI when needed)
addopts = -v

# Ignore patterns
norecursedirs =
    .git
    __pycache__
    htmlcov
    .pytest_cache
    venv
    .venv
    node_modules

# Test markers
markers =
    unit: Unit tests
    integration: Integration tests
    api: API tests
    slow: Slow running tests
