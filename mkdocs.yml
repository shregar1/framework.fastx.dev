site_name: FastMVC API Documentation
site_description: Interactive API documentation for FastMVC application
site_url: http://localhost:8000/docs

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    # Dark mode (default)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: fuchsia
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: fuchsia
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fastmvc/fastmvc
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/fastmvc/
  version:
    provider: mike

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
  - swagger-ui-tag:
      background: '#0f0f1a'
      theme: 'dark'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes

extra_css:
  - stylesheets/swagger.css

extra_javascript:
  - javascripts/swagger-embed.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: guide/installation.md
    - Quick Start: guide/quickstart.md
    - Project Structure: guide/project-structure.md
    - New API scaffolding: guide/new-api-scaffolding.md
    - "The `_maint` folder (critical)": guide/maint-folder.md
    - Core Features: guide/features.md
  - User Guide:
    - CLI Reference: guide/cli.md
    - Configuration: guide/configuration.md
    - API Documentation: guide/api-docs.md
    - DataI Migrations: guide/dataI.md
    - Testing: guide/testing.md
    - Docker: guide/docker.md
    - CI/CD: guide/ci-cd.md
  - API Reference:
    - Overview: api/overview.md
    - Ecosystem API: api/ecosystem.md
    - Endpoints: api/endpoints.md
    - DTO Models: api/dtos.md
  - Changelog:
    - Release History: CHANGELOG.md
    - Rules: CHANGELOG_RULES.md
  - Ecosystem:
    - Overview: ecosystem/index.md
    - FastCLI: ecosystem/fast-cli.md
    - FastDataI: ecosystem/fast-dataI.md
    - FastMiddleware: ecosystem/fast-middleware.md
    - FastDashboards: ecosystem/fast-dashboards.md
    - FastPlatform: ecosystem/fast-platform.md
  - Reference: reference/index.md

dev_addr: 127.0.0.1:8001
