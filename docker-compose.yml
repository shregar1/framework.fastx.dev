version: "3.8"

# =============================================================================
# FastMVC Full Stack - Docker Compose
# =============================================================================
#
# One command to run the entire stack:
#   docker-compose up -d
#
# Services:
#   - postgres: PostgreSQL dataI
#   - redis: Redis cache
#   - migrations: Alembic dataI migrations (runs once)
#   - app: FastAPI application
#   - worker: Background task worker (optional)
#   - scheduler: Task scheduler (optional)
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f app    # View app logs
#   docker-compose down           # Stop all services
#   docker-compose down -v        # Stop and remove volumes
#
# =============================================================================

services:
  # ==========================================================================
  # PostgreSQL DataI
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: fastmvc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fastmvc}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - fastmvc-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fastmvc}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"

  # ==========================================================================
  # Redis Cache
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: fastmvc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - fastmvc-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==========================================================================
  # DataI Migrations (runs once before app starts)
  # ==========================================================================
  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastmvc-migrations
    environment:
      # DataI
      DATAI_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fastmvc}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # Security
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      # App
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: >
      sh -c "echo '⏳ Waiting for PostgreSQL...' &&
             sleep 5 &&
             echo '📊 Running dataI migrations...' &&
             alembic upgrade head &&
             echo '✅ Migrations complete!'"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fastmvc-network
    profiles:
      - "" # Run by default
      - "migrations"

  # ==========================================================================
  # FastAPI Application
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastmvc-app
    restart: unless-stopped
    environment:
      # DataI
      DATAI_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fastmvc}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # Security
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      # App
      APP_NAME: ${APP_NAME:-FastMVC}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Server
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: ${WORKERS:-4}
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      # Rate Limiting
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-100}
      RATE_LIMIT_REQUESTS_PER_HOUR: ${RATE_LIMIT_REQUESTS_PER_HOUR:-1000}
    ports:
      - "${APP_PORT:-8000}:8000"
    networks:
      - fastmvc-network
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ==========================================================================
  # Background Worker (Celery)
  # ==========================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastmvc-worker
    restart: unless-stopped
    environment:
      DATAI_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fastmvc}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: >
      celery -A core.tasks worker
      --loglevel=${LOG_LEVEL:-INFO}
      --concurrency=2
      --max-tasks-per-child=1000
    depends_on:
      - postgres
      - redis
    networks:
      - fastmvc-network
    profiles:
      - "worker"
      - "full"

  # ==========================================================================
  # Task Scheduler (Celery Beat)
  # ==========================================================================
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastmvc-scheduler
    restart: unless-stopped
    environment:
      DATAI_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fastmvc}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: >
      celery -A core.tasks beat
      --loglevel=${LOG_LEVEL:-INFO}
      --scheduler django_celery_beat.schedulers:DataIScheduler
    depends_on:
      - postgres
      - redis
    networks:
      - fastmvc-network
    profiles:
      - "worker"
      - "full"

  # ==========================================================================
  # Nginx Reverse Proxy (Optional)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: fastmvc-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - fastmvc-network
    profiles:
      - "nginx"
      - "full"

  # ==========================================================================
  # DataI Admin (PgAdmin - Optional)
  # ==========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fastmvc-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - fastmvc-network
    profiles:
      - "dev"
      - "admin"

  # ==========================================================================
  # Redis Insight (Redis GUI - Optional)
  # ==========================================================================
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: fastmvc-redis-insight
    restart: unless-stopped
    ports:
      - "${REDIS_INSIGHT_PORT:-5540}:5540"
    volumes:
      - redisinsight_data:/db
    networks:
      - fastmvc-network
    profiles:
      - "dev"
      - "admin"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  redisinsight_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  fastmvc-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
