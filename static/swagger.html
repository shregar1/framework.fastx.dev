<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastMVC API Documentation</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

    <!-- Swagger UI CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables for FastMVC Theme */
        :root {
            --fastmvc-primary: #0ea5e9;
            --fastmvc-primary-dark: #0284c7;
            --fastmvc-accent: #d946ef;
            --fastmvc-accent-dark: #c026d3;
            --fastmvc-bg: #0a0a0f;
            --fastmvc-surface: #12121a;
            --fastmvc-card: #1a1a25;
            --fastmvc-border: #2d2d3d;
            --fastmvc-text: #f1f5f9;
            --fastmvc-text-muted: #94a3b8;
            --fastmvc-success: #22c55e;
            --fastmvc-warning: #f59e0b;
            --fastmvc-error: #ef4444;
            --fastmvc-info: #3b82f6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--fastmvc-bg);
            color: var(--fastmvc-text);
        }

        /* Custom Header */
        .fastmvc-header {
            background: linear-gradient(135deg, var(--fastmvc-primary) 0%, var(--fastmvc-accent) 100%);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3);
        }

        .fastmvc-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .fastmvc-logo {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            backdrop-filter: blur(10px);
        }

        .fastmvc-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .fastmvc-subtitle {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .fastmvc-nav {
            display: flex;
            gap: 1rem;
        }

        .fastmvc-nav a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .fastmvc-nav a:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .fastmvc-nav a.active {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Swagger UI Overrides */
        #swagger-ui {
            max-width: 1460px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Loading State */
        .swagger-ui .loading-container {
            background: var(--fastmvc-surface);
            border-radius: 12px;
            padding: 40px;
        }

        .swagger-ui .loading-container .loading::after {
            border-color: var(--fastmvc-primary) transparent var(--fastmvc-primary) transparent;
        }

        /* Topbar - Hide default, use custom header */
        .swagger-ui .topbar {
            display: none !important;
        }

        /* Info Section */
        .swagger-ui .information-container {
            background: var(--fastmvc-card);
            border: 1px solid var(--fastmvc-border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .swagger-ui .info {
            margin: 0;
        }

        .swagger-ui .info .title {
            color: var(--fastmvc-text);
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .swagger-ui .info .title small {
            background: var(--fastmvc-primary) !important;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .swagger-ui .info .description {
            color: var(--fastmvc-text-muted);
            font-size: 1.1rem;
            line-height: 1.7;
        }

        .swagger-ui .info .main {
            margin: 20px 0;
        }

        .swagger-ui .info a {
            color: var(--fastmvc-primary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .swagger-ui .info a:hover {
            color: var(--fastmvc-accent);
            text-decoration: underline;
        }

        /* Schemes */
        .swagger-ui .scheme-container {
            background: var(--fastmvc-card);
            border: 1px solid var(--fastmvc-border);
            border-radius: 12px;
            padding: 20px;
            margin: 0 0 30px 0;
            box-shadow: none;
        }

        .swagger-ui .schemes > label {
            color: var(--fastmvc-text);
            font-weight: 500;
        }

        .swagger-ui .schemes select {
            background: var(--fastmvc-surface);
            border: 1px solid var(--fastmvc-border);
            color: var(--fastmvc-text);
            border-radius: 6px;
            padding: 8px 12px;
        }

        /* Authorization Button */
        .swagger-ui .btn.authorize {
            background: var(--fastmvc-success);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            padding: 8px 20px;
            transition: all 0.2s;
        }

        .swagger-ui .btn.authorize:hover {
            background: #16a34a;
            transform: translateY(-1px);
        }

        .swagger-ui .btn.authorize svg {
            fill: white;
        }

        /* Filter */
        .swagger-ui .filter .operation-filter-input {
            background: var(--fastmvc-surface);
            border: 1px solid var(--fastmvc-border);
            border-radius: 8px;
            color: var(--fastmvc-text);
            padding: 10px 15px;
            font-size: 1rem;
        }

        .swagger-ui .filter .operation-filter-input::placeholder {
            color: var(--fastmvc-text-muted);
        }

        /* Operation Blocks */
        .swagger-ui .opblock {
            background: var(--fastmvc-card);
            border: 1px solid var(--fastmvc-border);
            border-radius: 12px;
            margin: 0 0 20px 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .swagger-ui .opblock:hover {
            border-color: var(--fastmvc-primary);
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.15);
        }

        .swagger-ui .opblock .opblock-summary {
            padding: 20px;
            border-bottom: 1px solid var(--fastmvc-border);
        }

        .swagger-ui .opblock .opblock-summary-method {
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.85rem;
            min-width: 80px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 0;
        }

        /* HTTP Method Colors */
        .swagger-ui .opblock.opblock-get .opblock-summary-method { background: var(--fastmvc-primary); }
        .swagger-ui .opblock.opblock-post .opblock-summary-method { background: var(--fastmvc-success); }
        .swagger-ui .opblock.opblock-put .opblock-summary-method { background: var(--fastmvc-warning); }
        .swagger-ui .opblock.opblock-delete .opblock-summary-method { background: var(--fastmvc-error); }
        .swagger-ui .opblock.opblock-patch .opblock-summary-method { background: var(--fastmvc-accent); }

        .swagger-ui .opblock .opblock-summary-path {
            color: var(--fastmvc-text);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 1rem;
        }

        .swagger-ui .opblock .opblock-summary-description {
            color: var(--fastmvc-text-muted);
            font-size: 0.9rem;
        }

        /* Operation Details */
        .swagger-ui .opblock .opblock-body {
            background: var(--fastmvc-surface);
        }

        .swagger-ui .opblock-description-wrapper {
            padding: 20px;
        }

        .swagger-ui .opblock-description-wrapper p {
            color: var(--fastmvc-text);
            line-height: 1.7;
        }

        /* Parameters */
        .swagger-ui .parameters-container {
            padding: 0 20px 20px 20px;
        }

        .swagger-ui .parameters-col_name {
            color: var(--fastmvc-primary);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .swagger-ui .parameters-col_description {
            color: var(--fastmvc-text);
        }

        .swagger-ui .parameter__type {
            color: var(--fastmvc-accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .swagger-ui .parameter__name.required::after {
            color: var(--fastmvc-error);
        }

        /* Request Body */
        .swagger-ui .opblock-section-header {
            background: var(--fastmvc-card);
            border-bottom: 1px solid var(--fastmvc-border);
            padding: 15px 20px;
        }

        .swagger-ui .opblock-section-header h4 {
            color: var(--fastmvc-text);
            font-weight: 600;
        }

        .swagger-ui .tab-header {
            background: var(--fastmvc-card);
            border-bottom: 1px solid var(--fastmvc-border);
        }

        .swagger-ui .tab-header .tab-item {
            color: var(--fastmvc-text-muted);
            font-weight: 500;
        }

        .swagger-ui .tab-header .tab-item.active {
            color: var(--fastmvc-primary);
            border-bottom: 2px solid var(--fastmvc-primary);
        }

        /* Code Samples */
        .swagger-ui .highlight-code {
            background: #0d1117;
            border-radius: 8px;
            overflow: hidden;
        }

        .swagger-ui .highlight-code .microlight {
            color: #e6edf3;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* Responses */
        .swagger-ui .responses-wrapper {
            padding: 0 20px 20px 20px;
        }

        .swagger-ui .responses-inner {
            padding: 0;
        }

        .swagger-ui .response-col_status {
            color: var(--fastmvc-success);
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .swagger-ui .response-col_status.response-col_status_error {
            color: var(--fastmvc-error);
        }

        .swagger-ui .response-col_description {
            color: var(--fastmvc-text);
        }

        /* Models */
        .swagger-ui .model-box {
            background: var(--fastmvc-card);
            border: 1px solid var(--fastmvc-border);
            border-radius: 8px;
            padding: 15px;
        }

        .swagger-ui .model-title {
            color: var(--fastmvc-primary);
            font-weight: 600;
        }

        .swagger-ui .prop-name {
            color: var(--fastmvc-text);
            font-weight: 600;
        }

        .swagger-ui .prop-type {
            color: var(--fastmvc-accent);
            font-family: 'JetBrains Mono', monospace;
        }

        .swagger-ui .prop-format {
            color: var(--fastmvc-text-muted);
        }

        /* Execute Button */
        .swagger-ui .btn.execute {
            background: var(--fastmvc-success);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            padding: 12px 24px;
            transition: all 0.2s;
        }

        .swagger-ui .btn.execute:hover {
            background: #16a34a;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        .swagger-ui .btn.cancel {
            background: var(--fastmvc-error);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            padding: 12px 24px;
        }

        /* Try It Out */
        .swagger-ui .try-out {
            padding: 20px;
        }

        .swagger-ui .try-out__btn {
            border: 2px solid var(--fastmvc-primary);
            color: var(--fastmvc-primary);
            background: transparent;
            border-radius: 8px;
            font-weight: 600;
            padding: 8px 20px;
            transition: all 0.2s;
        }

        .swagger-ui .try-out__btn:hover {
            background: var(--fastmvc-primary);
            color: white;
        }

        /* Inputs */
        .swagger-ui input[type=text],
        .swagger-ui input[type=email],
        .swagger-ui input[type=password],
        .swagger-ui textarea {
            background: var(--fastmvc-surface);
            border: 1px solid var(--fastmvc-border);
            border-radius: 6px;
            color: var(--fastmvc-text);
            padding: 10px 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .swagger-ui input[type=text]:focus,
        .swagger-ui input[type=email]:focus,
        .swagger-ui input[type=password]:focus,
        .swagger-ui textarea:focus {
            border-color: var(--fastmvc-primary);
            outline: none;
        }

        /* Select */
        .swagger-ui select {
            background: var(--fastmvc-surface);
            border: 1px solid var(--fastmvc-border);
            border-radius: 6px;
            color: var(--fastmvc-text);
            padding: 10px 15px;
        }

        /* Copy Button */
        .swagger-ui .copy-to-clipboard {
            background: var(--fastmvc-primary);
            border-radius: 4px;
            transition: all 0.2s;
        }

        .swagger-ui .copy-to-clipboard:hover {
            background: var(--fastmvc-primary-dark);
        }

        /* Section Headers */
        .swagger-ui .opblock-tag {
            color: var(--fastmvc-text);
            font-size: 1.3rem;
            font-weight: 700;
            border-bottom: 2px solid var(--fastmvc-border);
            padding: 20px 0;
            margin: 30px 0 20px 0;
        }

        .swagger-ui .opblock-tag:hover {
            background: rgba(14, 165, 233, 0.05);
        }

        .swagger-ui .opblock-tag svg {
            fill: var(--fastmvc-primary);
        }

        /* Expand/Collapse */
        .swagger-ui .expand-methods,
        .swagger-ui .expand-operation {
            fill: var(--fastmvc-primary);
        }

        /* Errors */
        .swagger-ui .errors-wrapper {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--fastmvc-error);
            border-radius: 8px;
            padding: 20px;
        }

        .swagger-ui .errors-wrapper .errors h4 {
            color: var(--fastmvc-error);
        }

        /* Footer */
        .swagger-ui .footer {
            display: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--fastmvc-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--fastmvc-border);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--fastmvc-primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .fastmvc-header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .fastmvc-nav {
                flex-wrap: wrap;
                justify-content: center;
            }

            #swagger-ui {
                padding: 10px;
            }

            .swagger-ui .opblock .opblock-summary {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- FastMVC Custom Header -->
    <header class="fastmvc-header">
        <div class="fastmvc-brand">
            <div class="fastmvc-logo">⚡</div>
            <div>
                <h1 class="fastmvc-title">FastMVC</h1>
                <span class="fastmvc-subtitle">API Documentation</span>
            </div>
        </div>
        <nav class="fastmvc-nav">
            <a href="/docs" class="active">Swagger UI</a>
            <a href="/redoc">ReDoc</a>
            <a href="/openapi.json">OpenAPI</a>
        </nav>
    </header>

    <!-- Swagger UI Container -->
    <div id="swagger-ui"></div>

    <!-- Swagger UI Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>

    <script>
        window.onload = function() {
            // Initialize Swagger UI with custom configuration
            window.ui = SwaggerUIBundle({
                url: '/openapi.json',
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: 'ILayout',
                validatorUrl: null,
                tryItOutEnabled: true,
                supportedSubmitMethods: ['get', 'post', 'put', 'delete', 'patch'],
                onComplete: function() {
                    // Add FastMVC branding to the info section
                    const infoTitle = document.querySelector('.info .title');
                    if (infoTitle && !infoTitle.querySelector('.fastmvc-badge')) {
                        const badge = document.createElement('span');
                        badge.className = 'fastmvc-badge';
                        badge.style.cssText = `
                            background: linear-gradient(135deg, var(--fastmvc-primary), var(--fastmvc-accent));
                            color: white;
                            padding: 4px 12px;
                            border-radius: 20px;
                            font-size: 0.7rem;
                            font-weight: 700;
                            text-transform: uppercase;
                            letter-spacing: 0.1em;
                            margin-left: 10px;
                            vertical-align: middle;
                        `;
                        badge.textContent = 'FastMVC';
                        infoTitle.appendChild(badge);
                    }
                }
            });
        };
    </script>
</body>
</html>
