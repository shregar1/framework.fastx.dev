<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FastMVC — API Server</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #151519;
      --surface-hover: #1e1e24;
      --border: #25252c;
      --border-hover: #353540;
      --text: #f0f0f5;
      --text-muted: #8a8a98;
      --accent: #00d4aa;
      --accent-hover: #00b894;
      --error: #ff5a65;
      --success: #00d4aa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* Logo */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .logo-icon svg {
      width: 22px;
      height: 22px;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .logo-text span {
      color: var(--accent);
    }

    /* Status Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--success);
      margin-bottom: 1rem;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    /* Base URL */
    .base-url {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.875rem 1rem;
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .base-url-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.375rem;
    }

    .base-url-value {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8125rem;
      color: var(--text);
      word-break: break-all;
    }

    /* Links Grid */
    .links {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.8125rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s ease;
    }

    .link:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }

    .link svg {
      width: 16px;
      height: 16px;
      opacity: 0.7;
    }

    .link-primary {
      grid-column: span 2;
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .link-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .link-primary svg {
      opacity: 0.9;
    }

    /* Footer */
    .footer {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer a:hover {
      color: var(--text);
    }

    .footer-dot {
      margin: 0 0.5rem;
      opacity: 0.4;
    }

    /* Responsive */
    @media (max-width: 380px) {
      .links {
        grid-template-columns: 1fr;
      }
      
      .link-primary {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
          <polyline points="12 22 12 15.5"/>
          <polyline points="22 8.5 12 15.5 2 8.5"/>
        </svg>
      </div>
      <div class="logo-text">Fast<span>MVC</span></div>
    </div>

    <!-- Main Card -->
    <div class="card">
      <div class="status">
        <span class="status-dot"></span>
        Running
      </div>
      
      <h1>API Server</h1>
      <p class="subtitle">Production-grade FastAPI stack with MVC architecture</p>
      
      <div class="base-url">
        <div class="base-url-label">Base URL</div>
        <div class="base-url-value" id="origin">http://localhost:8000</div>
      </div>
      
      <nav class="links" aria-label="Quick links">
        <a class="link link-primary" href="/docs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          Swagger Docs
        </a>
        <a class="link" href="/redoc">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          ReDoc
        </a>
        <a class="link" href="/health">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
          Health
        </a>
        <a class="link" href="/openapi.json">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
          OpenAPI
        </a>
      </nav>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <a href="https://github.com/shregar1/fastMVC" target="_blank" rel="noopener">GitHub</a>
      <span class="footer-dot">·</span>
      <a href="https://fastapi-mvc.dev" target="_blank" rel="noopener">Documentation</a>
    </footer>
  </div>

  <script>
    (function () {
      var el = document.getElementById("origin");
      if (el) {
        el.textContent = window.location.origin || "http://localhost:8000";
      }
    })();
  </script>
</body>
</html>
